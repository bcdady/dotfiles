[env]

RUST_WITHOUT = 'rust-docs'

[tool_alias]
k = "kubectl"

[tools]
# AWS and Cloud Tools
awscli = "latest"
aws-sso = "latest"
terraform = "prefix:1"
terraform-docs = "prefix:0"
tflint = "latest"
vault = "prefix:1"

# Kubernetes Tools
helm = "prefix:3.16"
krew = "latest"
kube-linter = "latest"
kubectl = "prefix:1"
kubectx = "prefix:0.9"
kubie = "latest"

# Development Languages
golang = "prefix:1"
nodejs = "latest"
python = "prefix:3"

# Development Tools
bazel = "5.2.0"
bitwarden = "latest"
bun = "latest"
checkov = "prefix:3"
dasel = "2.8.1"
gitconfig = "latest"
glab = "latest"
hadolint = "latest"
jq = "latest"
mysql = "prefix:8.0"
opencode = "latest"
tfsec = "latest"
yamllint = "latest"
yarn = "latest"

# Python Tools
ruff = "latest"
uv = "latest"

