[env]

RUST_WITHOUT = 'rust-docs'

[tool_alias]
k = "kubectl"

[tools]
# AWS and Cloud Tools
awscli = "prefix:2"
aws-sso = "latest"
terraform = "prefix:1"
terraform-docs = "prefix:0"
tflint = "prefix:0"
vault = "prefix:2"

# Kubernetes Tools
helm = "prefix:3"
krew = "prefix:0"
kube-linter = "prefix:0"
kubectl = "prefix:1"
kubectx = "prefix:0"
kubie = "prefix:0"

# Development Languages
golang = "prefix:1"
nodejs = "lts"
python = "prefix:3"

# Development Tools
bazel = "prefix:5"
fd = "latest"
bitwarden = "latest"
bun = "latest"
checkov = "prefix:3"
dasel = "prefix:2"
gitconfig = "latest"
glab = "latest"
hadolint = "latest"
jq = "latest"
mysql = "prefix:8.0"
opencode = "latest"
rtk = "latest"
tfsec = "latest"
yamllint = "latest"
yarn = "prefix:3"

# Python Tools
ruff = "latest"
uv = "latest"

